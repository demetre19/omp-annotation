<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Annotation Fixture</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #111827; color: white; }
    header { padding: 24px; background: #1f2937; }
    main { display: grid; grid-template-columns: 240px 1fr; gap: 24px; padding: 24px; }
    nav, section { border: 1px solid #374151; border-radius: 16px; padding: 20px; background: #030712; }
    button { border: 0; border-radius: 12px; background: #f59e0b; padding: 12px 16px; font-weight: 800; }
    .hero { min-height: 260px; }
  </style>
</head>
<body>
  <header>
    <p class="stm-pv-kicker">Protected video hosting</p>
    <h1>Demo Website</h1>
  </header>
  <main>
    <nav aria-label="Lessons">
      <a href="#week-1">Week 1 Video</a>
      <a href="#week-2">Week 2 Video</a>
    </nav>
    <section class="hero" data-testid="hero-card">
      <h2 id="week-1">Week 1 Video</h2>
      <p>Start here with the Week 1 session replay.</p>
      <button id="cta" aria-label="Play Week 1 video">Play video</button>
    </section>
  </main>
</body>
</html>
